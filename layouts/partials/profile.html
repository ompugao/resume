<div class="text-center p-4">
    <img src="{{ .Site.Params.profile.photo }}" alt="profile photo" class="w-36 h-36 rounded-full mx-auto mb-4">
    <h1 class="text-3xl font-bold mb-1">{{ .Site.Params.profile.name }}</h1>
    <p class="text-lg text-gray-600 dark:text-gray-400 mb-2">{{ .Site.Params.profile.title }}</p>
    <p class="text-sm text-gray-700 dark:text-gray-200 mb-4">{{ .Site.Params.profile.description }}</p>
    <div class="flex justify-center space-x-5 mt-4">
        {{ range .Site.Params.social.list }}
            <a href="{{ .url }}" class="text-2xl text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors duration-200" title="{{ .title }}"><i class="{{ .icon }}"></i></a>
        {{ end }}
    </div>
</div>
