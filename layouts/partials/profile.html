<div class="text-center">
    <img src="{{ .Site.Params.profile.photo }}" alt="profile photo" class="w-32 h-32 rounded-full mx-auto">
    <h1 class="text-3xl font-bold mt-4">{{ .Site.Params.profile.name }}</h1>
    <p class="text-xl text-gray-600 dark:text-gray-400">{{ .Site.Params.profile.title }}</p>
    <p class="text-xl text-gray-600 dark:text-gray-200">{{ .Site.Params.profile.description }}</p>
    <div class="flex justify-center space-x-4 mt-4">
        {{ range .Site.Params.social.list }}
            <a href="{{ .url }}" class="text-2xl" title="{{ .title }}"><i class="{{ .icon }}"></i></a>
        {{ end }}
    </div>
</div>
