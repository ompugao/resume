<header class="flex justify-between items-center py-4">
    <div>
        <a href="{{ .Site.BaseURL }}" class="text-2xl font-bold">{{ .Site.Title }}</a>
    </div>
    <nav>
        <ul class="flex space-x-4">
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
            {{ end }}
        </ul>
    </nav>
    <div>
        <button id="theme-toggle" class="px-4 py-2 rounded bg-gray-200 dark:bg-gray-800">
            Toggle
        </button>
    </div>
</header>
