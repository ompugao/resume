<div class="mb-16">
<h2 class="mt-4">
    <i class="fas fa-paperclip"></i> {{ .Site.Params.publications.title }}
</h2>
{{ range .Site.Params.publications.list }}
<h3 class="mt-2 mb-1"><a class="text-warning" href="{{ .url }}">{{ .title }}</a></h3>
<p class="mt-0 mb-0 ml-1">{{ .author | markdownify }}</p>
<p class="mt-2 mb-0 ml-1 text-gray-500">{{ .description | markdownify }}</p>
{{ end }}
</div>
